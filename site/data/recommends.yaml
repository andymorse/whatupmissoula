# WUM Recommends — curated list of local businesses we vouch for.
#
# This file is the single source of truth for the /recommends/ page. To add a
# business, copy an entry and fill in what you know — every contact field is
# optional and simply won't render if it's empty or missing.
#
#   name:      Business name (required)
#   category:  Short label shown as a chip, e.g. "IT & Cybersecurity" (required)
#   what:      What they do — factual, one or two sentences (required)
#   why:       Why WUM recommends them — the opinionated part, always positive (required)
#   website:   Full URL
#   email:     Contact email
#   phone:     Human-formatted, e.g. (406) 555-0100
#   address:   Street address shown as text
#   socials:   List of {label, url} pairs, e.g. {label: Instagram, url: https://...}
#
# House rule: entries only say nice things. If we can't recommend a business,
# it just doesn't appear here — this list never punches down.

businesses:
  - name: Fractional IT
    category: IT & Cybersecurity
    what: >-
      Managed IT and cybersecurity for small and mid-sized businesses —
      24/7 monitoring and help desk, cloud services, backups, and security
      training. A whole IT department for a fraction of the cost of hiring one.
    why: >-
      Full disclosure: Fractional IT is run by the same folks who bring you
      What's Up Missoula — so yes, we're biased, and yes, we'd still hire
      them. Enterprise-grade support with Montana roots, zero hidden fees,
      and a real human when you need help.
    website: https://fractionalit.io
    email: howdy@fractionalit.io

  - name: Everything Drains, LLC
    category: Plumbing & Drains
    what: >-
      Drain cleaning and repair experts serving Missoula and the surrounding
      area, available 24/7 — drain, sewer, and gutter cleaning, hydro-jetting,
      and trenchless spot repair (CIPP).
    why: >-
      We've used them ourselves and they did a great job — clean, professional,
      and best of all, a reasonable price. When a drain backs up you want
      someone who shows up and does it right; this is that guy.
    website: https://www.everythingdrainsllc.com/
    email: everythingdrainsllc@gmail.com
    phone: (406) 240-8083
    socials:
      - label: Facebook
        url: https://www.facebook.com/EverythingDrainsLLC

  - name: Little Dumps
    category: Landscape Materials
    what: >-
      Bulk landscape material delivered — garden soil, compost, mulch, bark,
      rock, gravel, and sand. Everything is web-based: schedule online 24/7
      (they even have a yardage calculator) and the truck shows up. Serves
      Missoula, the Bitterroot, and the Flathead.
    why: >-
      Just the best customer experience you can ask for. Schedule your
      delivery online and bam — truck shows up and you're set. One hot tip:
      put down a tarp for the driver. Makes cleanup a breeze.
    website: https://littledumps.com/
    socials:
      - label: Instagram
        url: https://www.instagram.com/littledumpsmt/

  - name: Montana Imaging Center
    category: Health & Medical
    what: >-
      Independent outpatient medical imaging in Missoula and Kalispell — MRI
      (including breast MRI), CT, coronary calcium scans, low-dose lung cancer
      screening, and full-body screening, read by board-certified,
      fellowship-trained radiologists.
    why: >-
      WUM staff have been patients here ourselves, and we can attest:
      genuinely affordable prices (around half of what the hospital
      charges), great staff who actually care, and top-notch facilities.
      Medical imaging without the hospital price tag — or the hospital
      experience.
    website: https://montanaimagingcenter.com/
    email: info@mtimagingcenter.com
    phone: (406) 540-4117
    address: 1510 S. Reserve St, Missoula

  - name: Montana Free Press — Missoula This Week
    category: Local News
    what: >-
      A free weekly newsletter from Montana Free Press, Montana's independent
      nonprofit newsroom. Reporter Katie Fairbanks covers Missoula city
      government, public school meetings, business news, and local events —
      the stuff that actually shapes life here.
    why: >-
      Real local journalism, free, from a nonprofit newsroom that answers to
      Montanans instead of advertisers. If you want to know what city council
      actually decided — not just what people are yelling about online — this
      is the newsletter to read. Full disclosure: the WUM team is a proud
      donor to Montana Free Press — we put our money where our news is.
    website: https://montanafreepress.org/missoula-this-week/
    socials:
      - label: Subscribe
        url: https://montanafreepress.org/newsletters-sign-up/

  - name: Harlequin Organic Produce
    category: Farms & Food
    what: >-
      Certified-organic farm growing distinctly colorful, seasonally flavored
      produce for the Missoula and Jocko valleys since 2010. Buy through a
      customizable CSA farm share, their online market, seasonal pop-up
      sales, or on the shelves of local grocery stores.
    why: >-
      A CSA share from Harlequin makes eating your vegetables the best part
      of the week — genuinely beautiful, flavorful produce grown right here,
      and because the share is customizable you get what you'll actually
      cook, not a mystery box.
    website: https://harlequinorganicproduce.com/
    socials:
      - label: Instagram
        url: https://www.instagram.com/harlequinproduce/

  - name: Oxbow Cattle Company
    category: Farms & Food
    what: >-
      Grass-raised, grass-finished beef from a locally owned Missoula ranch
      practicing regenerative agriculture. Individual cuts at their
      Farm-2-Market store and online shop, plus custom beef orders (they
      sell out — email to join the waitlist).
    why: >-
      Beef with a return address. Oxbow's aim is to leave the land better
      tomorrow than they found it today, and the beef that comes off that
      kind of ranching speaks for itself. The custom orders selling out
      every year tells you what Missoula already knows.
    website: https://www.oxbowcattleco.com/
    phone: (406) 529-3881
    address: 6225 Haugan Drive, Missoula
    socials:
      - label: Instagram
        url: https://www.instagram.com/oxbowbart/

  - name: Miller Creek Cafe
    category: Restaurants
    what: >-
      Neighborhood cafe in the Miller Creek area, open daily from breakfast
      hours through dinner. Burgers and classic cafe fare, with eight fresh
      draft beers from Bitter Root Brewing on tap and plenty of non-alcoholic
      options.
    why: >-
      A great local small business serving the Miller Creek community — the
      kind of spot every neighborhood wishes it had. Big win for families,
      too: the kids menu is genuinely good, not an afterthought.
    website: https://millercreekcafe.com/
    phone: (406) 251-3656
    address: 4915 Lower Miller Creek Road
