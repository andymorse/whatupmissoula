# Copy to config.yaml and adjust. Secrets stay in .env, not here.

site:
  name: "What's Up Missoula"
  base_url: "https://whatsupmissoula.com"   # confirm final domain/spelling
  output_dir: "../site/output"               # rendered static site (live)
  draft_dir: "drafts"                          # rendered draft, pre-review

ai:
  provider: "claude"          # overridden by AI_PROVIDER env if set
  model: "claude-opus-4-7"
  guidance_file: "../ai/guidance.md"
  max_pages_per_flyer: 8       # cap vision input per flyer
  image_max_px: 1600           # downscale long edge before sending

email:
  # Only messages from these senders/domains are treated as flyers.
  # Discovered from the live mailbox 2026-05-21 (so far only welcome emails;
  # confirm/extend once real weekly-ad emails arrive).
  lookback_days: 8
  allowed_senders:
    - "info@rosauers.com"
    - "communications@email.goodfoodstore.com"
    - "*.albertsons.com"            # albertsons@p..., no-reply@groceries...
    - "no-reply@yokesfreshmarkets.com"   # likely the Super1 source — CONFIRM
  subject_hints: ["weekly ad", "this week", "flyer", "deals", "savings", "ad"]
  # NOTE: these senders link out to a web-hosted flyer (often Flipp) rather than
  # attaching it. The extractor must follow the "view ad" link, not read an
  # attachment. Build that once a real weekly-ad email is in hand.

# Email-confirmed stores (mirror ai/guidance.md §2). Web-flyer stores rendered
# from their ad page (Orange Street Food Farm, Costco) are a later phase.
# WinCo is excluded — no weekly ad (footer explains this to readers).
stores:
  - name: "Rosauers"
  - name: "Super1 Stevensville"
  - name: "Super1 Hamilton"
  - name: "Good Food Store"
  - name: "Albertsons"
